  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f1b2d; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  .login img { width: 56px; margin-bottom: 14px; }
  .login h1 { font-size: 17px; color: #c8d6e5; margin-bottom: 22px; font-weight: 500; }
  .login input { width: 100%; padding: 11px 14px; border: 1px solid #2a3f5f; border-radius: 8px; font-size: 14px; font-family: inherit; background: #0f1b2d; color: #e0e6ed; outline: none; }
  .login input:focus { border-color: #4a90d9; }
  .login input::placeholder { color: #5a7a9a; }
  .login button { margin-top: 14px; width: 100%; padding: 11px; background: #2563a8; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: inherit; transition: background 0.2s; }
  .login button:hover { background: #1d4f8a; }
  .login .error { color: #e57373; font-size: 12px; margin-top: 8px; display: none; }
  #portal { display: none; }
</style>
</head>

  <img src="favicon.png" alt="">
  <h1>LuggageWebApp ポータル</h1>
  <input type="password" id="pw" placeholder="パスワード" autofocus onkeydown="if(event.key==='Enter')unlock()">

</div>

function b64ToArr(b64) {
  var bin = atob(b64);
  var arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function unlock() {
  var pw = document.getElementById('pw').value;
  if (!pw) return;
  try {
    var salt = b64ToArr(ENC.salt);
    var iv = b64ToArr(ENC.iv);
    var tag = b64ToArr(ENC.tag);
    var data = b64ToArr(ENC.data);

    var enc = new TextEncoder();
    var keyMaterial = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: salt, iterations: 32, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );

    var combined = new Uint8Array(data.length + tag.length);
    combined.set(data);
    combined.set(tag, data.length);

    var decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: iv },
      key,
      combined
    );

    var html = new TextDecoder().decode(decrypted);
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('portal').style.display = 'block';
    document.getElementById('portal').innerHTML = html;
  } catch (e) {
    document.getElementById('err').style.display = 'block';
  }
}
