<!DOCTYPE html>
<html lang="ja">
<head>

<title>LuggageWebApp ポータル</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f6f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login { background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 340px; text-align: center; }
  .login img { width: 48px; margin-bottom: 12px; }
  .login h1 { font-size: 16px; color: #333; margin-bottom: 20px; }
  .login input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; }
  .login button { margin-top: 12px; width: 100%; padding: 10px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-family: inherit; }
  .login button:hover { background: #1557b0; }
  .login .error { color: #d93025; font-size: 12px; margin-top: 8px; display: none; }
  #portal { display: none; }
</style>
</head>
<body>
<div class="login" id="loginBox">
  <img src="favicon.png" alt="">
  <h1>LuggageWebApp ポータル</h1>
  <input type="password" id="pw" placeholder="パスワード" autofocus onkeydown="if(event.key==='Enter')unlock()">
  <button onclick="unlock()">ログイン</button>
  <div class="error" id="err">パスワードが正しくありません</div>
</div>
<div id="portal"></div>

function b64ToArr(b64) {
  var bin = atob(b64);
  var arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function unlock() {
  var pw = document.getElementById('pw').value;
  if (!pw) return;
  try {
    var salt = b64ToArr(ENC.salt);
    var iv = b64ToArr(ENC.iv);
    var tag = b64ToArr(ENC.tag);
    var data = b64ToArr(ENC.data);

    var enc = new TextEncoder();
    var keyMaterial = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    var key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: salt, iterations: 32, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );

    var combined = new Uint8Array(data.length + tag.length);
    combined.set(data);
    combined.set(tag, data.length);

    var decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: iv },
      key,
      combined
    );

    var html = new TextDecoder().decode(decrypted);
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('portal').style.display = 'block';
    document.getElementById('portal').innerHTML = html;
  } catch (e) {
    document.getElementById('err').style.display = 'block';
  }
}
</script>
