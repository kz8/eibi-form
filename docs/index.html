<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>荷物登録フォーム</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  * { margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #f5f6f8; }
  iframe { width: 100%; height: 100%; border: none; opacity: 0; transition: opacity .4s; }
  iframe.loaded { opacity: 1; }
  .loader { position: fixed; inset: 0; background: #f5f6f8; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; transition: opacity .4s; }
  .loader.hide { opacity: 0; pointer-events: none; }
  .loader img { width: 48px; margin-bottom: 16px; }
  .loader p { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px; color: #5f6672; }
  .dots::after { content: ''; animation: dots 1.5s steps(4) infinite; }
  @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
</style>
</head>
<body>
<div class="loader" id="loader">
  <img src="favicon.png" alt="">
  <p>読み込み中<span class="dots"></span></p>
</div>
<iframe id="form-frame" sandbox="allow-scripts allow-forms allow-popups allow-downloads allow-same-origin allow-modals" allowfullscreen></iframe>
<script>
(function() {
  var gasUrl = 'https://script.google.com/macros/s/AKfycbxtlohnAfhotpjnfeleTxIMOLlgw71GAxdpB0Gz6hi4uld_NItEmKTK-K58C1qC7heI/exec';
  var params = window.location.search;
  var sp = new URLSearchParams(params);
  var mode = sp.get('mode') || '';
  var titles = {
    opview: '参加状況ビューア',
    receiving: '入庫記録',
    guidance: '集荷案内メール送信'
  };
  if (titles[mode]) document.title = titles[mode];
  var frame = document.getElementById('form-frame');
  var done = false;
  function showFrame() {
    if (done) return;
    done = true;
    document.getElementById('loader').classList.add('hide');
    frame.classList.add('loaded');
  }
  // 8秒後にローダーを消す（フォーム描画完了を待つ）
  setTimeout(showFrame, 8000);
  frame.src = gasUrl + params;
})();
</script>
</body>
</html>
